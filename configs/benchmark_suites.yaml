suites:
  - name: main_2026_05
    description: Main April 2026 comparison candidates.
    model_ids:
      - openai/gpt-5.5
      - openai/gpt-5.4
      - anthropic/claude-opus-4.7
      - anthropic/claude-sonnet-4.6
      - google/gemini-3.1-pro-preview
      - qwen/qwen3.6-27b
      - moonshotai/kimi-k2.6

  - name: budget_2026_05
    description: Budget-oriented models for low-cost benchmark runs.
    model_ids:
      - google/gemini-3-flash-preview
      - openai/gpt-4o-mini
      - openai/gpt-oss-120b

  - name: all_2026_05
    description: All April 2026 comparison models without duplicates.
    model_ids:
      - openai/gpt-5.5
      - openai/gpt-5.4
      - anthropic/claude-opus-4.7
      - anthropic/claude-sonnet-4.6
      - google/gemini-3.1-pro-preview
      - qwen/qwen3.6-27b
      - moonshotai/kimi-k2.6
      - google/gemini-3-flash-preview
      - openai/gpt-4o-mini
      - openai/gpt-oss-120b
    charts:
      - id: openai_gpt54_vs_gpt55_bar
        type: two_model_bar
        title: GPT-5.4 vs GPT-5.5 Language Token Efficiency
        model_ids:
          - openai/gpt-5.4
          - openai/gpt-5.5
        output_name: openai_gpt54_vs_gpt55_bar
        sort_languages: by_lower_average_model
        show_value_labels: true
        legend_position: top

      - id: anthropic_sonnet46_vs_opus47_bar
        type: two_model_bar
        title: Claude Sonnet 4.6 vs Claude Opus 4.7 Language Token Efficiency
        model_ids:
          - anthropic/claude-sonnet-4.6
          - anthropic/claude-opus-4.7
        output_name: anthropic_sonnet46_vs_opus47_bar
        sort_languages: by_lower_average_model
        show_value_labels: true
        legend_position: top

  - name: public_comparison_2026_05
    description: Models selected for the public comparison table.
    model_ids:
      - openai/gpt-5.5
      - anthropic/claude-opus-4.7
      - google/gemini-3.1-pro-preview
      - qwen/qwen3.6-27b
      - moonshotai/kimi-k2.6
    charts:
      - id: openai_vs_anthropic_bar
        type: two_model_bar
        title: OpenAI vs Anthropic Language Token Efficiency
        model_ids:
          - openai/gpt-5.5
          - anthropic/claude-opus-4.7
        output_name: openai_vs_anthropic_bar
        sort_languages: by_lower_average_model
        show_value_labels: true
        legend_position: top

  - name: anthropic_comparison_2026_05
    description: Anthropic-only comparison ordered by current upper-tier Claude models.
    model_ids:
      - anthropic/claude-opus-4.7
      - anthropic/claude-opus-4.6
      - anthropic/claude-sonnet-4.6
      - anthropic/claude-haiku-4.5
    charts:
      - id: anthropic_opus47_vs_opus46_bar
        type: two_model_bar
        title: Claude Opus 4.7 vs Claude Opus 4.6 Language Token Efficiency
        model_ids:
          - anthropic/claude-opus-4.7
          - anthropic/claude-opus-4.6
        output_name: anthropic_opus47_vs_opus46_bar
        sort_languages: by_lower_average_model
        show_value_labels: true
        legend_position: top

  - name: gpt_comparison_2026_05
    description: GPT-family comparison across GPT-5.5, GPT-5.4, GPT-4o mini, and GPT OSS 120B.
    model_ids:
      - openai/gpt-5.5
      - openai/gpt-5.4
      - openai/gpt-4o-mini
      - openai/gpt-oss-120b
    charts:
      - id: gpt55_vs_gpt54_bar
        type: two_model_bar
        title: GPT-5.5 vs GPT-5.4 Language Token Efficiency
        model_ids:
          - openai/gpt-5.5
          - openai/gpt-5.4
        output_name: gpt55_vs_gpt54_bar
        sort_languages: by_lower_average_model
        show_value_labels: true
        legend_position: top

      - id: gpt4o_mini_vs_gpt_oss120b_bar
        type: two_model_bar
        title: GPT-4o mini vs GPT OSS 120B Language Token Efficiency
        model_ids:
          - openai/gpt-4o-mini
          - openai/gpt-oss-120b
        output_name: gpt4o_mini_vs_gpt_oss120b_bar
        sort_languages: by_lower_average_model
        show_value_labels: true
        legend_position: top

  - name: frontier_comparison_2026_05
    description: Eight-model frontier comparison excluding lower-cost and extra models.
    model_ids:
      - openai/gpt-5.5
      - openai/gpt-5.4
      - anthropic/claude-opus-4.7
      - anthropic/claude-opus-4.6
      - anthropic/claude-sonnet-4.6
      - google/gemini-3.1-pro-preview
      - qwen/qwen3.6-27b
      - moonshotai/kimi-k2.6
