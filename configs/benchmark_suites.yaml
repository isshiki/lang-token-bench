    model_ids:
      - google/gemini-3-flash-preview
      - openai/gpt-4o-mini
      - openai/gpt-oss-120b

  - name: all_2026_04
    description: All April 2026 comparison models without duplicates.
    model_ids:
      - openai/gpt-5.5
      - openai/gpt-5.4
      - anthropic/claude-opus-4.7
      - anthropic/claude-sonnet-4.6
      - google/gemini-3.1-pro-preview
