texts:
  - id: short_instruction
    description: A short general summarization instruction.
    contents:
      en: "Summarize the following text in three concise bullet points for a general reader."
      ja: "次のテキストを、一般読者向けに簡潔な箇条書き3点で要約してください。"
      zh: "请面向普通读者，用三个简洁的要点总结以下文本。"
      ko: "다음 텍스트를 일반 독자를 위해 세 개의 간결한 요점으로 요약하세요."
      es: "Resume el siguiente texto en tres viñetas concisas para un lector general."
      fr: "Résumez le texte suivant en trois points concis pour un public général."
      ar: "لخّص النص التالي في ثلاث نقاط موجزة موجهة إلى قارئ عام."
      hi: "निम्नलिखित पाठ को सामान्य पाठक के लिए तीन संक्षिप्त बिंदुओं में सारांशित करें।"

  - id: medium_coding_instruction
    description: A medium-length AI coding assistant instruction.
    contents:
      en: >-
        Refactor the following Python function to improve readability, maintainability, and type safety without changing its external behavior. Add clear type hints, simplify overly complex conditionals, and keep the public interface compatible with existing callers. If you introduce helper functions, keep them small and focused. After the code, briefly explain the main changes, note any assumptions you made, and mention one or two tests that should be added to confirm the behavior still works.
      ja: >-
        次の Python 関数をリファクタリングし、外部から見た動作を変えずに、読みやすさ、保守性、型安全性を改善してください。明確な型ヒントを追加し、過度に複雑な条件分岐を簡潔にし、既存の呼び出し元と互換性のある公開インターフェースを維持してください。ヘルパー関数を導入する場合は、小さく目的を絞ったものにしてください。コードの後に、主な変更点、置いた前提、動作が維持されていることを確認するために追加すべきテストを1つか2つ簡潔に説明してください。
      zh: >-
        请重构下面的 Python 函数，在不改变其外部行为的前提下，提高可读性、可维护性和类型安全性。添加清晰的类型提示，简化过于复杂的条件判断，并保持公共接口与现有调用方兼容。如果引入辅助函数，请让它们保持小而专注。代码之后，请简要说明主要修改、你所做的假设，以及应添加一两个哪些测试来确认行为仍然正常。
      ko: >-
        다음 Python 함수를 외부 동작은 바꾸지 않으면서 가독성, 유지보수성, 타입 안전성을 높이도록 리팩터링하세요. 명확한 타입 힌트를 추가하고, 지나치게 복잡한 조건문을 단순화하며, 기존 호출자와 호환되는 공개 인터페이스를 유지하세요. 헬퍼 함수를 도입한다면 작고 목적이 분명하게 유지하세요. 코드 뒤에는 주요 변경 사항, 사용한 가정, 동작이 그대로 유지되는지 확인하기 위해 추가해야 할 테스트 한두 가지를 간단히 설명하세요.
      es: >-
        Refactoriza la siguiente función de Python para mejorar su legibilidad, mantenibilidad y seguridad de tipos sin cambiar su comportamiento externo. Agrega anotaciones de tipo claras, simplifica las condiciones demasiado complejas y mantén la interfaz pública compatible con los llamadores existentes. Si introduces funciones auxiliares, haz que sean pequeñas y enfocadas. Después del código, explica brevemente los cambios principales, señala cualquier suposición que hayas hecho y menciona una o dos pruebas que deberían añadirse para confirmar que el comportamiento sigue funcionando.
      fr: >-
        Refactorisez la fonction Python suivante afin d'améliorer sa lisibilité, sa maintenabilité et sa sûreté de typage sans modifier son comportement externe. Ajoutez des annotations de type claires, simplifiez les conditions trop complexes et conservez une interface publique compatible avec les appelants existants. Si vous introduisez des fonctions d'aide, gardez-les petites et ciblées. Après le code, expliquez brièvement les principaux changements, indiquez les hypothèses retenues et mentionnez un ou deux tests à ajouter pour confirmer que le comportement fonctionne toujours.
      ar: >-
        أعد هيكلة دالة Python التالية لتحسين قابليتها للقراءة والصيانة وسلامة الأنواع من دون تغيير سلوكها الخارجي. أضف تلميحات أنواع واضحة، وبسّط الشروط المعقدة أكثر من اللازم، وحافظ على توافق الواجهة العامة مع المستدعين الحاليين. إذا أضفت دوال مساعدة، فاجعلها صغيرة ومركزة. بعد الكود، اشرح بإيجاز التغييرات الرئيسية، واذكر أي افتراضات اعتمدت عليها، واقترح اختبارا أو اختبارين ينبغي إضافتهما للتأكد من أن السلوك ما زال يعمل كما هو متوقع.
      hi: >-
        निम्नलिखित Python function को इस तरह refactor करें कि उसका बाहरी व्यवहार बदले बिना readability, maintainability और type safety बेहतर हो। स्पष्ट type hints जोड़ें, बहुत जटिल conditionals को सरल करें, और public interface को मौजूदा callers के साथ compatible रखें। यदि आप helper functions जोड़ते हैं, तो उन्हें छोटा और focused रखें। कोड के बाद मुख्य बदलावों को संक्षेप में समझाएँ, आपने जो assumptions लिए हैं उन्हें बताएं, और व्यवहार अब भी सही है यह पुष्टि करने के लिए एक या दो tests सुझाएँ।

  - id: long_news_summary_instruction
    description: A detailed news article summarization instruction.
    contents:
      en: |-
        Read the following news article and prepare a structured summary for readers who have not seen the original text. Start with a clear article title that reflects the central event or announcement without adding opinion. Then write a normal summary in two or three short paragraphs, explaining what happened, who was involved, why it matters, and what may happen next if the article states that clearly.

        After the summary, list the key points in bullet form. Include the main people, companies, organizations, products, policies, or technologies mentioned in the article. Extract important numbers, dates, deadlines, prices, percentages, locations, and other concrete details when they appear. If the article includes uncertainty, disagreement, unconfirmed information, missing context, or something that is not yet known, explicitly write that it is unclear or not stated.

        Do not add your own interpretation, prediction, evaluation, background knowledge, or external facts. Do not make the article sound more certain than it is. At the end, write a short bookmark note of about 140 characters that explains why the article may be worth saving, sharing, or reading later.
      ja: |-
        次のニュース記事を読み、元の記事を読んでいない読者にも分かるように構造化された要約を作成してください。最初に、意見を加えず、中心となる出来事や発表を反映した明確な記事タイトルを書いてください。次に、通常の要約を2〜3個の短い段落で書き、何が起きたのか、誰が関係しているのか、なぜ重要なのか、記事内で明確に述べられている場合は今後何が起こり得るのかを説明してください。

        要約の後に、重要なポイントを箇条書きで整理してください。記事に登場する主な人物、企業、組織、製品、政策、技術を含めてください。重要な数字、日付、期限、価格、割合、場所、そのほかの具体的な情報が出てくる場合は抽出してください。記事に不確実性、意見の対立、未確認情報、不足している文脈、まだ分かっていないことが含まれる場合は、それが不明または記事に記載されていないことを明示してください。

        独自の解釈、予測、評価、背景知識、外部情報を加えないでください。記事の内容を実際より確実であるかのように書かないでください。最後に、その記事を保存、共有、または後で読む価値がある理由を示す、140文字程度の短いブックマーク用メモを書いてください。
      zh: |-
        请阅读以下新闻文章，并为没有看过原文的读者准备一份结构化摘要。开头先写一个清晰的文章标题，准确反映核心事件或公告，不加入个人观点。然后用两到三个短段落写出普通摘要，说明发生了什么、涉及哪些人或组织、为什么重要，以及如果文章明确说明了后续发展，也说明接下来可能会发生什么。

        摘要之后，请用项目符号列出关键要点。包括文章提到的主要人物、公司、组织、产品、政策或技术。文中出现重要数字、日期、截止时间、价格、百分比、地点以及其他具体细节时，请将其提取出来。如果文章包含不确定性、分歧、未经确认的信息、缺失的背景，或某些尚不清楚的事项，请明确写出该内容不清楚或文章未说明。

        不要加入你自己的解释、预测、评价、背景知识或外部事实。不要让文章显得比原文更确定。最后，请写一条约140个字符的简短书签备注，说明这篇文章为什么值得保存、分享或稍后阅读。
      ko: |-
        다음 뉴스 기사를 읽고 원문을 보지 않은 독자도 이해할 수 있도록 구조화된 요약을 작성하세요. 먼저 의견을 덧붙이지 말고 핵심 사건이나 발표를 반영하는 명확한 기사 제목을 쓰세요. 그다음 일반 요약을 두세 개의 짧은 단락으로 작성하여, 무슨 일이 있었는지, 누가 관련되어 있는지, 왜 중요한지, 그리고 기사에서 명확히 언급한 경우 앞으로 어떤 일이 일어날 수 있는지 설명하세요.

        요약 뒤에는 핵심 내용을 bullet point로 정리하세요. 기사에 언급된 주요 인물, 기업, 조직, 제품, 정책, 기술을 포함하세요. 중요한 숫자, 날짜, 마감일, 가격, 비율, 장소, 그 밖의 구체적인 세부 사항이 나오면 추출하세요. 기사에 불확실성, 의견 차이, 확인되지 않은 정보, 부족한 맥락, 아직 알려지지 않은 내용이 있다면 그것이 불분명하거나 기사에 명시되어 있지 않다고 분명히 쓰세요.

        자신의 해석, 예측, 평가, 배경지식, 외부 사실을 추가하지 마세요. 기사의 내용이 실제보다 더 확실한 것처럼 표현하지 마세요. 마지막에는 이 기사를 저장하거나 공유하거나 나중에 읽을 가치가 있는 이유를 설명하는 약 140자 분량의 짧은 북마크 메모를 작성하세요.
      es: |-
        Lee el siguiente artículo de noticias y prepara un resumen estructurado para lectores que no hayan visto el texto original. Empieza con un título claro que refleje el evento o anuncio central sin añadir opinión. Luego escribe un resumen normal en dos o tres párrafos breves, explicando qué ocurrió, quiénes participaron, por qué es importante y qué podría ocurrir después si el artículo lo indica con claridad.

        Después del resumen, enumera los puntos clave en forma de viñetas. Incluye las principales personas, empresas, organizaciones, productos, políticas o tecnologías mencionadas en el artículo. Extrae números importantes, fechas, plazos, precios, porcentajes, lugares y otros detalles concretos cuando aparezcan. Si el artículo contiene incertidumbre, desacuerdo, información no confirmada, contexto faltante o algo que aún no se sabe, escribe explícitamente que no está claro o que no se indica en el artículo.

        No añadas tu propia interpretación, predicción, evaluación, conocimiento de fondo ni datos externos. No hagas que el artículo parezca más seguro de lo que realmente es. Al final, escribe una breve nota de marcador de unas 140 letras que explique por qué el artículo puede valer la pena para guardar, compartir o leer más tarde.
      fr: |-
        Lisez l'article d'actualité suivant et préparez un résumé structuré pour des lecteurs qui n'ont pas vu le texte original. Commencez par un titre clair qui reflète l'événement ou l'annonce principale sans ajouter d'opinion. Rédigez ensuite un résumé classique en deux ou trois courts paragraphes, en expliquant ce qui s'est passé, qui est impliqué, pourquoi c'est important et ce qui pourrait arriver ensuite si l'article l'indique clairement.

        Après le résumé, listez les points clés sous forme de puces. Incluez les principales personnes, entreprises, organisations, produits, politiques ou technologies mentionnés dans l'article. Relevez les nombres importants, les dates, les échéances, les prix, les pourcentages, les lieux et les autres détails concrets lorsqu'ils apparaissent. Si l'article contient une incertitude, un désaccord, une information non confirmée, un contexte manquant ou quelque chose qui n'est pas encore connu, indiquez explicitement que ce point est flou ou non précisé.

        N'ajoutez pas votre propre interprétation, prédiction, évaluation, connaissance de contexte ou fait externe. Ne donnez pas à l'article un degré de certitude supérieur à celui du texte original. À la fin, rédigez une courte note de favori d'environ 140 caractères expliquant pourquoi l'article peut mériter d'être conservé, partagé ou lu plus tard.
      ar: |-
        اقرأ المقال الإخباري التالي وأعد ملخصا منظما للقراء الذين لم يطالعوا النص الأصلي. ابدأ بعنوان واضح للمقال يعكس الحدث أو الإعلان الرئيسي من دون إضافة رأي. بعد ذلك اكتب ملخصا عاديا في فقرتين أو ثلاث فقرات قصيرة، يوضح ما الذي حدث، ومن الأطراف المعنية، ولماذا يعد الأمر مهما، وما الذي قد يحدث لاحقا إذا كان المقال يذكر ذلك بوضوح.

        بعد الملخص، اعرض النقاط الأساسية في شكل نقاط تعداد. اذكر الأشخاص أو الشركات أو المؤسسات أو المنتجات أو السياسات أو التقنيات الرئيسية التي وردت في المقال. استخرج الأرقام المهمة والتواريخ والمواعيد النهائية والأسعار والنسب المئوية والمواقع والتفاصيل الملموسة الأخرى عند ظهورها. إذا تضمن المقال حالة عدم يقين أو خلافا أو معلومات غير مؤكدة أو سياقا ناقصا أو أمرا لم يتضح بعد، فاكتب صراحة أن ذلك غير واضح أو غير مذكور في المقال.

        لا تضف تفسيرا أو توقعا أو تقييما أو معرفة خلفية أو حقائق خارجية من عندك. لا تجعل المقال يبدو أكثر يقينا مما هو عليه. في النهاية، اكتب ملاحظة قصيرة للإشارة المرجعية في حدود 140 حرفا تشرح لماذا قد يستحق المقال الحفظ أو المشاركة أو القراءة لاحقا.
      hi: |-
        निम्नलिखित समाचार लेख पढ़ें और उन पाठकों के लिए एक संरचित सारांश तैयार करें जिन्होंने मूल पाठ नहीं देखा है। शुरुआत में एक स्पष्ट लेख शीर्षक लिखें जो मुख्य घटना या घोषणा को बिना राय जोड़े दर्शाए। फिर दो या तीन छोटे अनुच्छेदों में सामान्य सारांश लिखें, जिसमें बताया जाए कि क्या हुआ, कौन शामिल था, यह क्यों महत्वपूर्ण है, और यदि लेख स्पष्ट रूप से बताता है तो आगे क्या हो सकता है।

        सारांश के बाद मुख्य बिंदुओं को bullet points में सूचीबद्ध करें। लेख में बताए गए प्रमुख लोगों, कंपनियों, संगठनों, उत्पादों, नीतियों या तकनीकों को शामिल करें। जहां महत्वपूर्ण संख्याएँ, तारीखें, deadlines, prices, percentages, स्थान या अन्य ठोस विवरण आएं, उन्हें निकालें। यदि लेख में अनिश्चितता, असहमति, अपुष्ट जानकारी, अधूरा संदर्भ या कोई ऐसी बात हो जो अभी ज्ञात नहीं है, तो स्पष्ट रूप से लिखें कि यह अस्पष्ट है या लेख में नहीं बताया गया है।

        अपनी व्याख्या, अनुमान, मूल्यांकन, पृष्ठभूमि ज्ञान या बाहरी तथ्य न जोड़ें। लेख को वास्तविकता से अधिक निश्चित न दिखाएँ। अंत में लगभग 140 characters की एक छोटी bookmark note लिखें, जिसमें बताया जाए कि यह लेख सहेजने, साझा करने या बाद में पढ़ने लायक क्यों हो सकता है।

  - id: long_system_prompt
    description: A long system prompt for an AI agent assistant.
    contents:
      en: |-
        You are a helpful AI assistant for software development, technical research, and practical writing tasks. Your goal is to give answers that are accurate, useful, and easy to act on. Read the user's request carefully, identify the concrete outcome they want, and avoid adding unnecessary features, assumptions, or explanations. When the request is ambiguous, first use the available context to make a reasonable interpretation. Ask a clarifying question only when proceeding would create a meaningful risk, such as changing the wrong file, using the wrong API, exposing private data, or giving advice that depends on missing constraints.

        Be honest about uncertainty. Do not invent facts, citations, command output, file contents, package behavior, API responses, or execution results. Clearly distinguish what you actually verified from what you inferred. If you run a command, summarize the relevant result instead of implying success without evidence. If you did not run a command, say so when that matters.

        For coding tasks, prefer small, focused changes that match the existing project style. Preserve public interfaces unless the user asks to change them. Before editing files, understand the surrounding structure and avoid unrelated refactors. Explain trade-offs when they matter, especially around security, performance, maintainability, compatibility, and test coverage. When generating code, include enough context for the user to understand where it belongs, but do not bury the answer in unnecessary boilerplate.

        Treat secrets and costly operations with care. Do not read, display, edit, or commit `.env` files unless the user has explicitly defined a safe runtime-loading behavior for the application. Never print API keys, tokens, credentials, or private configuration values. Before suggesting or running an operation that may cost money, send network requests, modify external systems, delete data, or change production state, make the risk clear and prefer a dry-run or preview mode when available.

        Follow the user's formatting and language preferences. Keep responses concise by default, but provide structured details when the task is complex. Use lists for steps, tables for comparisons, and code blocks for commands or source code. Respect explicit constraints about files, commands, tools, output formats, and language. If the user asks for something unsafe, private, or unsupported, refuse briefly and offer a safer alternative.
      ja: |-
        あなたは、ソフトウェア開発、技術調査、実務的な文章作成を支援する有用なAIアシスタントです。目標は、正確で役に立ち、すぐ行動に移せる回答を提供することです。ユーザーの依頼を注意深く読み、求められている具体的な成果を特定し、不要な機能、前提、説明を追加しないでください。依頼が曖昧な場合は、まず利用可能な文脈から妥当な解釈を行ってください。間違ったファイルを変更する、誤ったAPIを使う、非公開データを露出する、不足した制約に依存する助言を行うなど、進めることで意味のあるリスクが生じる場合にだけ確認質問をしてください。

        不確実性には正直でいてください。事実、引用、コマンド出力、ファイル内容、パッケージの挙動、APIレスポンス、実行結果を捏造してはいけません。実際に確認したことと推測したことを明確に区別してください。コマンドを実行した場合は、証拠なく成功を示唆するのではなく、関連する結果を要約してください。コマンドを実行していないことが重要な場合は、その旨を述べてください。

        コーディング作業では、既存プロジェクトのスタイルに合う小さく焦点の定まった変更を優先してください。ユーザーが変更を求めない限り、公開インターフェースを維持してください。ファイルを編集する前に周辺構造を理解し、無関係なリファクタリングを避けてください。セキュリティ、性能、保守性、互換性、テスト範囲に関わる場合は、必要なトレードオフを説明してください。コードを生成する場合は、ユーザーが配置場所を理解できる十分な文脈を含めつつ、不要な定型コードで回答を埋めないでください。

        秘密情報と費用が発生する操作は慎重に扱ってください。ユーザーがアプリケーションの安全な実行時ロード動作を明示していない限り、`.env` ファイルを読んだり、表示したり、編集したり、コミットしたりしてはいけません。APIキー、トークン、認証情報、非公開の設定値を絶対に出力しないでください。費用が発生する、ネットワークリクエストを送る、外部システムを変更する、データを削除する、本番状態を変更する可能性のある操作を提案または実行する前に、リスクを明確にし、利用可能であれば dry-run や preview モードを優先してください。

        ユーザーの書式と言語の好みに従ってください。通常は簡潔に回答し、複雑な作業では構造化された詳細を示してください。手順にはリスト、比較には表、コマンドやソースコードにはコードブロックを使ってください。ファイル、コマンド、ツール、出力形式、言語に関する明示的な制約を尊重してください。ユーザーが安全でない、非公開の、または対応できないことを求めた場合は、短く拒否し、より安全な代替案を提示してください。
      zh: |-
        你是一个有帮助的 AI 助手，用于软件开发、技术研究和实际写作任务。你的目标是给出准确、有用并且容易执行的回答。请仔细阅读用户请求，识别他们真正想要的具体结果，并避免添加不必要的功能、假设或解释。当请求含糊时，先利用已有上下文做出合理解释。只有在继续操作会产生实质风险时才提出澄清问题，例如修改错误文件、使用错误 API、暴露私有数据，或给出依赖缺失约束的建议。

        请诚实面对不确定性。不要编造事实、引用、命令输出、文件内容、包行为、API 响应或执行结果。清楚区分你实际验证过的内容和你的推断。如果你运行了命令，请总结相关结果，而不要在没有证据的情况下暗示成功。如果你没有运行命令，而这一点很重要，请明确说明。

        对于编码任务，优先做小而集中的修改，并匹配现有项目风格。除非用户要求更改，否则保持公共接口不变。编辑文件前，先理解周围结构，避免无关重构。在安全、性能、可维护性、兼容性和测试覆盖方面存在重要取舍时，请解释这些取舍。生成代码时，提供足够上下文，让用户理解代码应放在哪里，但不要用不必要的样板代码淹没回答。

        谨慎处理秘密信息和可能产生成本的操作。除非用户已经明确定义应用程序的安全运行时加载行为，否则不要读取、显示、编辑或提交 `.env` 文件。绝不要打印 API key、token、凭据或私有配置值。在建议或执行可能花费金钱、发送网络请求、修改外部系统、删除数据或改变生产状态的操作前，请说明风险，并在可用时优先使用 dry-run 或 preview 模式。

        遵循用户的格式和语言偏好。默认保持回答简洁，但在任务复杂时提供结构化细节。步骤使用列表，比较使用表格，命令或源代码使用代码块。尊重用户对文件、命令、工具、输出格式和语言的明确限制。如果用户请求不安全、涉及私密内容或无法支持的事项，请简短拒绝，并提供更安全的替代方案。
      ko: |-
        당신은 소프트웨어 개발, 기술 조사, 실무적인 글쓰기 작업을 돕는 유용한 AI assistant입니다. 목표는 정확하고 유용하며 바로 실행할 수 있는 답변을 제공하는 것입니다. 사용자의 요청을 주의 깊게 읽고, 사용자가 원하는 구체적인 결과를 파악하며, 불필요한 기능, 가정, 설명을 추가하지 마세요. 요청이 모호할 때는 먼저 사용 가능한 맥락을 바탕으로 합리적으로 해석하세요. 잘못된 파일을 변경하거나, 잘못된 API를 사용하거나, 비공개 데이터를 노출하거나, 빠진 제약에 의존하는 조언을 하게 되는 등 의미 있는 위험이 있을 때만 확인 질문을 하세요.

        불확실성에 대해서는 정직하세요. 사실, 인용, 명령 출력, 파일 내용, 패키지 동작, API 응답, 실행 결과를 지어내지 마세요. 실제로 확인한 내용과 추론한 내용을 명확히 구분하세요. 명령을 실행했다면 근거 없이 성공을 암시하지 말고 관련 결과를 요약하세요. 명령을 실행하지 않았다는 점이 중요하다면 그렇게 말하세요.

        코딩 작업에서는 기존 프로젝트 스타일에 맞는 작고 집중된 변경을 우선하세요. 사용자가 요청하지 않는 한 공개 인터페이스를 유지하세요. 파일을 편집하기 전에 주변 구조를 이해하고 관련 없는 리팩터링을 피하세요. 보안, 성능, 유지보수성, 호환성, 테스트 범위와 관련된 중요한 trade-off가 있을 때는 설명하세요. 코드를 생성할 때는 사용자가 어디에 넣어야 하는지 이해할 수 있을 만큼의 맥락을 제공하되, 불필요한 보일러플레이트로 답변을 채우지 마세요.

        비밀 정보와 비용이 발생할 수 있는 작업은 신중하게 다루세요. 사용자가 애플리케이션의 안전한 런타임 로드 동작을 명시하지 않는 한 `.env` 파일을 읽거나, 표시하거나, 편집하거나, commit하지 마세요. API key, token, credential, private configuration value를 절대 출력하지 마세요. 비용이 들거나, 네트워크 요청을 보내거나, 외부 시스템을 수정하거나, 데이터를 삭제하거나, production 상태를 바꿀 수 있는 작업을 제안하거나 실행하기 전에 위험을 명확히 하고, 가능하다면 dry-run 또는 preview 모드를 우선하세요.

        사용자의 형식과 언어 선호를 따르세요. 기본적으로 간결하게 답하되, 작업이 복잡하면 구조화된 세부 정보를 제공하세요. 단계에는 목록을, 비교에는 표를, 명령이나 소스 코드에는 code block을 사용하세요. 파일, 명령, 도구, 출력 형식, 언어에 대한 명시적 제약을 존중하세요. 사용자가 안전하지 않거나 비공개이거나 지원할 수 없는 것을 요청하면 짧게 거절하고 더 안전한 대안을 제시하세요.
      es: |-
        Eres un asistente de IA útil para desarrollo de software, investigación técnica y tareas prácticas de redacción. Tu objetivo es dar respuestas precisas, útiles y fáciles de aplicar. Lee con cuidado la solicitud del usuario, identifica el resultado concreto que quiere y evita añadir funciones, suposiciones o explicaciones innecesarias. Cuando la solicitud sea ambigua, usa primero el contexto disponible para hacer una interpretación razonable. Haz una pregunta aclaratoria solo cuando continuar implique un riesgo significativo, como modificar el archivo equivocado, usar la API equivocada, exponer datos privados o dar consejos que dependan de restricciones faltantes.

        Sé honesto sobre la incertidumbre. No inventes hechos, citas, salidas de comandos, contenido de archivos, comportamiento de paquetes, respuestas de API ni resultados de ejecución. Distingue claramente lo que verificaste realmente de lo que inferiste. Si ejecutas un comando, resume el resultado relevante en lugar de insinuar éxito sin evidencia. Si no ejecutaste un comando y eso importa, dilo.

        Para tareas de programación, prefiere cambios pequeños y enfocados que coincidan con el estilo del proyecto existente. Conserva las interfaces públicas salvo que el usuario pida cambiarlas. Antes de editar archivos, entiende la estructura alrededor y evita refactorizaciones no relacionadas. Explica los trade-offs cuando importen, especialmente en seguridad, rendimiento, mantenibilidad, compatibilidad y cobertura de pruebas. Al generar código, incluye suficiente contexto para que el usuario entienda dónde debe ir, pero no entierres la respuesta en boilerplate innecesario.

        Trata los secretos y las operaciones costosas con cuidado. No leas, muestres, edites ni confirmes en un commit archivos `.env` salvo que el usuario haya definido explícitamente un comportamiento seguro de carga en tiempo de ejecución para la aplicación. Nunca imprimas API keys, tokens, credenciales ni valores de configuración privada. Antes de sugerir o ejecutar una operación que pueda costar dinero, enviar solicitudes de red, modificar sistemas externos, borrar datos o cambiar el estado de producción, aclara el riesgo y prefiere un modo dry-run o preview cuando esté disponible.

        Sigue las preferencias de formato e idioma del usuario. Mantén las respuestas concisas por defecto, pero proporciona detalles estructurados cuando la tarea sea compleja. Usa listas para pasos, tablas para comparaciones y bloques de código para comandos o código fuente. Respeta las restricciones explícitas sobre archivos, comandos, herramientas, formatos de salida e idioma. Si el usuario pide algo inseguro, privado o no admitido, rechaza brevemente la solicitud y ofrece una alternativa más segura.
      fr: |-
        Vous êtes un assistant IA utile pour le développement logiciel, la recherche technique et les tâches de rédaction pratiques. Votre objectif est de fournir des réponses exactes, utiles et faciles à mettre en action. Lisez attentivement la demande de l'utilisateur, identifiez le résultat concret attendu et évitez d'ajouter des fonctionnalités, hypothèses ou explications inutiles. Lorsque la demande est ambiguë, utilisez d'abord le contexte disponible pour en faire une interprétation raisonnable. Posez une question de clarification seulement si continuer créerait un risque réel, par exemple modifier le mauvais fichier, utiliser la mauvaise API, exposer des données privées ou donner un conseil dépendant de contraintes manquantes.

        Soyez honnête sur l'incertitude. N'inventez pas de faits, de citations, de sorties de commandes, de contenus de fichiers, de comportements de paquets, de réponses d'API ou de résultats d'exécution. Distinguez clairement ce que vous avez réellement vérifié de ce que vous avez déduit. Si vous exécutez une commande, résumez le résultat pertinent au lieu de suggérer un succès sans preuve. Si vous n'avez pas exécuté une commande et que cela compte, dites-le.

        Pour les tâches de code, privilégiez des changements petits et ciblés qui respectent le style du projet existant. Préservez les interfaces publiques sauf si l'utilisateur demande de les modifier. Avant d'éditer des fichiers, comprenez la structure environnante et évitez les refactorisations sans lien. Expliquez les compromis lorsqu'ils comptent, notamment en matière de sécurité, performance, maintenabilité, compatibilité et couverture de tests. Lorsque vous générez du code, fournissez assez de contexte pour que l'utilisateur comprenne où il doit aller, sans noyer la réponse dans du boilerplate inutile.

        Traitez les secrets et les opérations coûteuses avec prudence. Ne lisez pas, n'affichez pas, ne modifiez pas et ne commitez pas de fichiers `.env`, sauf si l'utilisateur a explicitement défini un comportement sûr de chargement à l'exécution pour l'application. N'imprimez jamais de clés API, tokens, identifiants ou valeurs de configuration privées. Avant de proposer ou d'exécuter une opération pouvant coûter de l'argent, envoyer des requêtes réseau, modifier des systèmes externes, supprimer des données ou changer un état de production, rendez le risque clair et privilégiez un mode dry-run ou preview lorsqu'il existe.

        Respectez les préférences de format et de langue de l'utilisateur. Répondez de manière concise par défaut, mais fournissez des détails structurés lorsque la tâche est complexe. Utilisez des listes pour les étapes, des tableaux pour les comparaisons et des blocs de code pour les commandes ou le code source. Respectez les contraintes explicites concernant les fichiers, commandes, outils, formats de sortie et langues. Si l'utilisateur demande quelque chose de dangereux, privé ou non pris en charge, refusez brièvement et proposez une alternative plus sûre.
      ar: |-
        أنت مساعد ذكاء اصطناعي مفيد لمهام تطوير البرمجيات والبحث التقني والكتابة العملية. هدفك هو تقديم إجابات دقيقة ومفيدة وسهلة التنفيذ. اقرأ طلب المستخدم بعناية، وحدد النتيجة الملموسة التي يريدها، وتجنب إضافة ميزات أو افتراضات أو شروحات غير ضرورية. عندما يكون الطلب غامضا، استخدم أولا السياق المتاح للوصول إلى تفسير معقول. لا تطرح سؤالا توضيحيا إلا عندما يكون الاستمرار قد يسبب خطرا معتبرا، مثل تعديل الملف الخطأ، أو استخدام API غير مناسب، أو كشف بيانات خاصة، أو تقديم نصيحة تعتمد على قيود غير مذكورة.

        كن صادقا بشأن عدم اليقين. لا تخترع حقائق أو اقتباسات أو مخرجات أوامر أو محتويات ملفات أو سلوك حزم أو ردود API أو نتائج تنفيذ. ميّز بوضوح بين ما تحققت منه فعلا وما استنتجته. إذا شغلت أمرا، فلخص النتيجة ذات الصلة بدلا من الإيحاء بالنجاح من دون دليل. إذا لم تشغل أمرا وكان ذلك مهما، فاذكر ذلك.

        في مهام البرمجة، فضّل التغييرات الصغيرة والمركزة التي تطابق أسلوب المشروع الحالي. حافظ على الواجهات العامة ما لم يطلب المستخدم تغييرها. قبل تعديل الملفات، افهم البنية المحيطة وتجنب عمليات refactor غير المرتبطة. اشرح المفاضلات عندما تكون مهمة، خصوصا في الأمن والأداء وقابلية الصيانة والتوافق وتغطية الاختبارات. عند توليد الكود، قدم سياقا كافيا ليفهم المستخدم أين يوضع، لكن لا تدفن الإجابة في boilerplate غير ضروري.

        تعامل مع الأسرار والعمليات المكلفة بحذر. لا تقرأ ملفات `.env` ولا تعرضها ولا تعدلها ولا تدرجها في commit إلا إذا عرّف المستخدم صراحة سلوكا آمنا لتحميلها وقت تشغيل التطبيق. لا تطبع أبدا API keys أو tokens أو credentials أو قيم إعدادات خاصة. قبل اقتراح أو تنفيذ عملية قد تكلف مالا، أو ترسل طلبات عبر الشبكة، أو تعدل أنظمة خارجية، أو تحذف بيانات، أو تغير حالة الإنتاج، وضح الخطر وفضّل وضع dry-run أو preview عندما يكون متاحا.

        اتبع تفضيلات المستخدم في التنسيق واللغة. اجعل الردود موجزة افتراضيا، لكن قدم تفاصيل منظمة عندما تكون المهمة معقدة. استخدم القوائم للخطوات، والجداول للمقارنات، وكتل الكود للأوامر أو المصدر البرمجي. احترم القيود الصريحة المتعلقة بالملفات والأوامر والأدوات وتنسيقات الإخراج واللغة. إذا طلب المستخدم شيئا غير آمن أو خاصا أو غير مدعوم، فارفض بإيجاز واقترح بديلا أكثر أمانا.
      hi: |-
        आप software development, technical research और practical writing tasks के लिए एक उपयोगी AI assistant हैं। आपका लक्ष्य ऐसे उत्तर देना है जो सही, उपयोगी और कार्रवाई योग्य हों। उपयोगकर्ता के अनुरोध को ध्यान से पढ़ें, वे कौन सा ठोस परिणाम चाहते हैं यह पहचानें, और अनावश्यक features, assumptions या explanations न जोड़ें। जब अनुरोध अस्पष्ट हो, तो पहले उपलब्ध context से उचित interpretation करें। Clarifying question केवल तब पूछें जब आगे बढ़ने से कोई महत्वपूर्ण जोखिम हो, जैसे गलत file बदलना, गलत API इस्तेमाल करना, private data उजागर करना, या missing constraints पर निर्भर सलाह देना।

        अनिश्चितता के बारे में ईमानदार रहें। facts, citations, command output, file contents, package behavior, API responses या execution results न गढ़ें। आपने वास्तव में क्या verify किया और क्या infer किया, इसे साफ अलग रखें। यदि आप command चलाते हैं, तो बिना evidence सफलता का संकेत देने के बजाय relevant result summarize करें। यदि आपने command नहीं चलाया और यह बात महत्वपूर्ण है, तो इसे कहें।

        Coding tasks में existing project style से मेल खाते छोटे और focused changes को प्राथमिकता दें। जब तक उपयोगकर्ता बदलाव न मांगे, public interfaces को बनाए रखें। Files edit करने से पहले आसपास की structure समझें और unrelated refactors से बचें। Security, performance, maintainability, compatibility और test coverage से जुड़े trade-offs महत्वपूर्ण हों तो उन्हें समझाएँ। Code generate करते समय इतना context दें कि उपयोगकर्ता समझ सके कि वह कहाँ रखा जाना चाहिए, लेकिन unnecessary boilerplate से उत्तर न भरें।

        Secrets और cost वाली operations को सावधानी से संभालें। जब तक उपयोगकर्ता application के safe runtime-loading behavior को स्पष्ट रूप से define न करे, `.env` files को न पढ़ें, न दिखाएँ, न edit करें, न commit करें। API keys, tokens, credentials या private configuration values कभी print न करें। ऐसा operation सुझाने या चलाने से पहले जो money cost कर सकता हो, network requests भेज सकता हो, external systems बदल सकता हो, data delete कर सकता हो या production state बदल सकता हो, risk स्पष्ट करें और उपलब्ध हो तो dry-run या preview mode को प्राथमिकता दें।

        उपयोगकर्ता की formatting और language preferences का पालन करें। सामान्यतः उत्तर concise रखें, लेकिन task जटिल हो तो structured details दें। Steps के लिए lists, comparisons के लिए tables, और commands या source code के लिए code blocks का उपयोग करें। Files, commands, tools, output formats और language पर दिए गए explicit constraints का सम्मान करें। यदि उपयोगकर्ता कुछ unsafe, private या unsupported मांगता है, तो संक्षेप में मना करें और सुरक्षित विकल्प दें।

  - id: very_long_article
    description: A very long article-style input about AI developer tools, cost, security, and team operations.
    contents:
      en: |-
        AI assistants are becoming a normal part of software development, but their value is not measured only by how quickly they can generate code. Teams are learning that the real question is how these tools change the full development workflow: reading unfamiliar systems, planning changes, writing tests, reviewing risks, and maintaining software after the first version is shipped. A model that writes a function quickly may still create work for the team if the code does not match local conventions, hides an edge case, or introduces a dependency that is hard to support. For this reason, many organizations are moving from casual experimentation to more structured evaluation.

        The first area they usually examine is productivity. Developers often use AI tools to summarize long files, explain error messages, draft unit tests, or produce a first version of a small feature. These tasks can save time, especially when the developer already understands the goal and can judge the output. The benefit is less predictable when the task requires deep knowledge of a legacy system, a complex domain rule, or a security-sensitive workflow. In those cases, the assistant may still be useful, but mostly as a collaborator that proposes options rather than as an automatic implementation engine.

        Cost is another practical concern. Token usage can vary widely depending on the language, the size of the prompt, the amount of repository context, and the model being used. A short instruction may cost very little, while a workflow that includes several files, test output, documentation, and repeated revisions can become expensive. Teams that use multiple languages may also notice that equivalent content can produce different token counts depending on the tokenizer. This does not mean that one language is better than another, but it does mean that token efficiency should be measured when estimating operating costs.

        Security and privacy require even more care. Code often contains internal architecture details, customer data, credentials, or business logic that should not be sent to external services without review. A safe AI development workflow begins with clear rules about what information may be shared, which providers are approved, how prompts are logged, and how generated output is reviewed before it is merged. Secret handling is especially important. API keys, access tokens, private certificates, and environment files should never be printed in logs or copied into prompts. Even when a tool is trusted, teams should design workflows that reduce accidental exposure.

        Quality control remains a human responsibility. AI-generated code should be reviewed like any other code, and sometimes more carefully, because it may look polished while still being wrong. Reviewers should check whether the change solves the actual problem, whether it preserves existing behavior, whether errors are handled clearly, and whether tests cover realistic cases. For documentation and summaries, reviewers should check that the assistant has not added unsupported claims. For refactoring, they should verify that public interfaces, data migrations, and compatibility requirements are preserved. The goal is not to distrust every suggestion, but to create a habit of verification.

        Latency also affects adoption. A powerful model may produce better reasoning, but if it takes too long to respond, developers may avoid using it for frequent small tasks. A faster model may be more useful for autocomplete, quick explanations, or repetitive edits, while a slower and more capable model may be reserved for planning, architecture review, or difficult debugging. Many teams eventually use a tiered approach: lightweight models for routine work, stronger models for complex analysis, and specialized tools for tasks such as search, formatting, static analysis, or dependency inspection.

        The strongest results usually come from combining AI assistance with existing engineering practices. Version control, code review, continuous integration, test coverage, issue tracking, and deployment monitoring still matter. AI does not replace these systems; it adds another layer of interaction on top of them. A useful assistant should understand project constraints, but the repository remains the source of truth. If the assistant proposes a change, the build, tests, linters, and reviewers must still confirm that the change is acceptable.

        Team operation is also changing. Some teams write shared prompt templates for common tasks such as bug triage, pull request review, test generation, and release notes. Others maintain internal guidance about which models to use, how much context to include, and when to stop using AI and ask a teammate. These guidelines reduce confusion and make costs easier to manage. They also help new team members learn safe habits before they rely on the tools for important work.

        A useful evaluation program should include both technical metrics and workflow observations. Technical metrics may include token count, latency, estimated cost, error rate, test pass rate, and the number of review comments required after generation. Workflow observations may include whether developers trust the output, whether reviewers can understand the changes, and whether the tool reduces repetitive work without increasing hidden risk. No single benchmark can capture the whole picture, but a small set of repeatable measurements can reveal patterns.

        Language and translation add another layer. A team that works in English, Japanese, Chinese, Korean, Spanish, French, Arabic, Hindi, or other languages may see different token counts for similar content. The difference can affect cost and context-window usage, especially when prompts include long requirements, documentation, or customer messages. However, token efficiency should not be interpreted as a judgment about the quality of a language. Translation choices, writing style, punctuation, terminology, and tokenizer design all influence the result. A fair benchmark should use aligned texts, explain its limitations, and keep the measurement separate from cultural or linguistic claims.

        In the long term, AI developer tools will likely become less like isolated chat windows and more like integrated systems that understand repositories, tickets, tests, logs, and deployment status. That integration can make the tools more useful, but it also increases the need for access control, audit trails, and clear boundaries. The more context a tool can see, the more carefully teams must decide what it is allowed to do. Good defaults matter: read-only analysis before write access, dry-run modes before real execution, and explicit confirmation before actions that cost money or change production systems.

        The best teams will treat AI assistance as an engineering capability, not as magic. They will measure cost, verify quality, protect secrets, document workflows, and adjust their practices as models and tools change. Used carefully, AI can reduce friction in software development and help people focus on design, judgment, and communication. Used carelessly, it can create hidden complexity, security exposure, and maintenance work. The difference depends less on a single model and more on the discipline of the workflow around it.
      ja: |-
        AIアシスタントはソフトウェア開発の通常の一部になりつつありますが、その価値はどれだけ速くコードを生成できるかだけでは測れません。チームは、重要なのはこれらのツールが開発ワークフロー全体をどう変えるかだと学び始めています。つまり、馴染みのないシステムを読むこと、変更を計画すること、テストを書くこと、リスクを確認すること、最初の版を出荷した後にソフトウェアを保守することです。関数を素早く書けるモデルでも、そのコードがローカルの慣習に合わなかったり、エッジケースを隠したり、支援しにくい依存関係を導入したりすれば、チームに作業を増やす可能性があります。そのため、多くの組織は気軽な実験から、より構造化された評価へ移行しています。

        最初に調べられることが多い領域は生産性です。開発者は長いファイルを要約したり、エラーメッセージを説明したり、単体テストの草案を書いたり、小さな機能の初版を作ったりするためにAIツールを使うことがよくあります。これらの作業は、開発者がすでに目的を理解し、出力を判断できる場合には時間を節約できます。タスクがレガシーシステム、複雑なドメインルール、セキュリティ上重要なワークフローに関する深い知識を必要とする場合、その効果は予測しにくくなります。そのような場合でもアシスタントは有用ですが、自動実装エンジンというより、選択肢を提案する協力者として役立つことが多いです。

        コストも実務上の重要な懸念です。トークン使用量は、言語、プロンプトの大きさ、リポジトリ文脈の量、使用するモデルによって大きく変わります。短い指示はほとんど費用がかからないかもしれませんが、複数のファイル、テスト出力、ドキュメント、繰り返しの修正を含むワークフローは高額になることがあります。複数言語を使うチームでは、同等の内容でもトークナイザーによってトークン数が異なることに気づく場合もあります。これは、ある言語が別の言語より優れているという意味ではありませんが、運用コストを見積もる際にはトークン効率を測定すべきだという意味です。

        セキュリティとプライバシーにはさらに注意が必要です。コードには、内部アーキテクチャの詳細、顧客データ、認証情報、レビューなしに外部サービスへ送るべきでないビジネスロジックが含まれることがよくあります。安全なAI開発ワークフローは、どの情報を共有してよいか、どのプロバイダーが承認されているか、プロンプトをどう記録するか、生成された出力をマージ前にどうレビューするかについての明確なルールから始まります。秘密情報の扱いは特に重要です。APIキー、アクセストークン、秘密証明書、環境ファイルはログに出力したりプロンプトへコピーしたりしてはいけません。ツールが信頼できる場合でも、チームは偶発的な露出を減らすワークフローを設計すべきです。

        品質管理は人間の責任として残ります。AIが生成したコードは他のコードと同じように、場合によってはより慎重にレビューされるべきです。見た目は整っていても間違っている可能性があるからです。レビュアーは、その変更が実際の問題を解決しているか、既存の動作を保っているか、エラーが明確に処理されているか、テストが現実的なケースを扱っているかを確認すべきです。ドキュメントや要約では、アシスタントが根拠のない主張を追加していないかを確認すべきです。リファクタリングでは、公開インターフェース、データ移行、互換性要件が保たれていることを検証すべきです。目的はすべての提案を疑うことではなく、検証の習慣を作ることです。

        レイテンシも採用に影響します。強力なモデルはよりよい推論を生むかもしれませんが、応答に時間がかかりすぎると、開発者は頻繁な小作業に使わなくなる可能性があります。高速なモデルは補完、短い説明、反復的な編集に向いており、遅くても高性能なモデルは計画、アーキテクチャレビュー、難しいデバッグに取っておくほうがよい場合があります。多くのチームは最終的に、日常作業には軽量モデル、複雑な分析には強力なモデル、検索、整形、静的解析、依存関係調査には専門ツールを使う階層的な方法を採用します。

        最も強い成果は、多くの場合、AI支援と既存のエンジニアリング実践を組み合わせることで得られます。バージョン管理、コードレビュー、継続的インテグレーション、テストカバレッジ、課題管理、デプロイ監視は今でも重要です。AIはこれらのシステムを置き換えるのではなく、その上にもう一つの相互作用の層を加えます。有用なアシスタントはプロジェクトの制約を理解すべきですが、リポジトリが真実の情報源であることは変わりません。アシスタントが変更を提案した場合でも、ビルド、テスト、リンター、レビュアーがその変更を受け入れられるか確認しなければなりません。

        チーム運用も変化しています。一部のチームは、バグトリアージ、プルリクエストレビュー、テスト生成、リリースノートなどの一般的な作業向けに共有プロンプトテンプレートを書いています。別のチームは、どのモデルを使うか、どれだけの文脈を含めるか、いつAIの利用をやめてチームメイトに相談するかについて内部ガイダンスを維持しています。これらの指針は混乱を減らし、コスト管理を容易にします。また、新しいチームメンバーが重要な作業でツールに頼る前に、安全な習慣を身につける助けにもなります。

        有用な評価プログラムには、技術的な指標とワークフロー上の観察の両方を含めるべきです。技術的な指標には、トークン数、レイテンシ、推定コスト、エラー率、テスト通過率、生成後に必要になったレビューコメント数などがあります。ワークフロー上の観察には、開発者が出力を信頼できるか、レビュアーが変更を理解できるか、ツールが隠れたリスクを増やさずに反復作業を減らしているかが含まれます。単一のベンチマークで全体像を捉えることはできませんが、繰り返し可能な少数の測定はパターンを明らかにできます。

        言語と翻訳はさらに別の層を加えます。英語、日本語、中国語、韓国語、スペイン語、フランス語、アラビア語、ヒンディー語、その他の言語で作業するチームでは、類似した内容でも異なるトークン数になる場合があります。この違いは、特にプロンプトに長い要件、ドキュメント、顧客メッセージが含まれる場合、コストやコンテキストウィンドウの使用量に影響します。ただし、トークン効率を言語の品質に対する判断として解釈すべきではありません。翻訳の選択、文体、句読点、用語、トークナイザー設計のすべてが結果に影響します。公正なベンチマークは、対応するテキストを使い、限界を説明し、測定を文化的または言語的主張から切り離すべきです。

        長期的には、AI開発者ツールは孤立したチャット画面というより、リポジトリ、チケット、テスト、ログ、デプロイ状況を理解する統合システムに近づいていくでしょう。その統合はツールをより有用にしますが、アクセス制御、監査証跡、明確な境界の必要性も高めます。ツールが見られる文脈が増えるほど、チームはそれに何を許可するかをより慎重に決めなければなりません。良いデフォルトが重要です。書き込み権限の前に読み取り専用分析、実行前に dry-run モード、費用が発生したり本番システムを変更したりする操作の前に明示的な確認が必要です。

        最良のチームは、AI支援を魔法ではなくエンジニアリング能力として扱います。コストを測り、品質を検証し、秘密情報を守り、ワークフローを文書化し、モデルやツールの変化に合わせて実践を調整します。慎重に使えば、AIはソフトウェア開発の摩擦を減らし、人々が設計、判断、コミュニケーションに集中する助けになります。不注意に使えば、隠れた複雑さ、セキュリティ上の露出、保守作業を生みます。その違いは、単一のモデルよりも、その周囲にあるワークフローの規律に大きく左右されます。
      zh: |-
        AI 助手正在成为软件开发中的常规组成部分，但它们的价值并不只取决于能多快生成代码。团队正在认识到，真正的问题是这些工具如何改变完整的开发流程：阅读不熟悉的系统、规划变更、编写测试、审查风险，以及在第一个版本发布后维护软件。一个模型即使能快速写出函数，如果代码不符合本地约定、隐藏边界情况，或引入难以支持的依赖，仍然可能给团队增加工作。因此，许多组织正在从随意试验转向更结构化的评估。

        他们通常首先考察的是生产力。开发者经常用 AI 工具总结长文件、解释错误信息、起草单元测试，或生成小功能的第一个版本。这些任务可以节省时间，尤其是在开发者已经理解目标并能判断输出时。当任务需要深入了解遗留系统、复杂领域规则或安全敏感流程时，收益就不那么可预测。在这些情况下，助手仍然有用，但更多是提出选项的协作者，而不是自动实现引擎。

        成本是另一个实际问题。Token 使用量会因语言、prompt 大小、仓库上下文数量以及所用模型而有很大差异。短指令可能成本很低，而包含多个文件、测试输出、文档和反复修改的工作流可能变得昂贵。使用多种语言的团队也可能发现，同等内容会因 tokenizer 不同而产生不同的 token 数。这并不意味着一种语言比另一种更好，但它确实意味着在估算运营成本时应测量 token efficiency。

        安全和隐私需要更多谨慎。代码常常包含内部架构细节、客户数据、凭据或不应未经审查就发送给外部服务的业务逻辑。安全的 AI 开发流程应从清晰规则开始：哪些信息可以共享，哪些 provider 被批准，prompt 如何记录，以及生成的输出在合并前如何审查。秘密处理尤其重要。API keys、access tokens、private certificates 和 environment files 不应出现在日志中，也不应复制到 prompts 里。即使工具值得信任，团队也应设计能减少意外暴露的工作流。

        质量控制仍然是人的责任。AI 生成的代码应像其他代码一样接受审查，有时还要更仔细，因为它可能看起来很完善但仍然错误。审查者应检查变更是否解决了实际问题、是否保留现有行为、错误处理是否清晰、测试是否覆盖现实场景。对于文档和摘要，审查者应确认助手没有添加无依据的说法。对于重构，应验证公共接口、数据迁移和兼容性要求是否保留。目标不是不信任每个建议，而是建立验证习惯。

        延迟也会影响采用。强大的模型可能产生更好的推理，但如果响应太慢，开发者可能不会在频繁的小任务中使用它。较快的模型可能更适合自动补全、快速解释或重复编辑，而较慢但能力更强的模型可保留给规划、架构审查或困难调试。许多团队最终会采用分层方式：轻量模型处理日常工作，强模型处理复杂分析，专门工具处理搜索、格式化、静态分析或依赖检查等任务。

        最好的结果通常来自将 AI 辅助与现有工程实践结合起来。版本控制、代码审查、持续集成、测试覆盖、问题跟踪和部署监控仍然重要。AI 不会替代这些系统，而是在其上增加另一层交互。有用的助手应理解项目约束，但仓库仍然是真实来源。如果助手提出变更，构建、测试、linter 和审查者仍必须确认该变更可以接受。

        团队运作也在变化。有些团队为 bug triage、pull request review、test generation 和 release notes 等常见任务编写共享 prompt templates。另一些团队维护内部指南，说明应使用哪些模型、包含多少上下文，以及何时停止使用 AI 并询问队友。这些指南能减少混乱，让成本更容易管理，也帮助新成员在依赖工具处理重要工作前养成安全习惯。

        有用的评估计划应同时包含技术指标和工作流观察。技术指标可包括 token count、latency、estimated cost、error rate、test pass rate，以及生成后需要的 review comments 数量。工作流观察可包括开发者是否信任输出、审查者是否能理解变更、工具是否在不增加隐藏风险的情况下降低重复工作。没有单一 benchmark 能捕捉全貌，但少量可重复测量可以揭示模式。

        语言和翻译又增加了一层。使用英语、日语、中文、韩语、西班牙语、法语、阿拉伯语、印地语或其他语言的团队可能会看到相似内容产生不同 token 数。这种差异会影响成本和 context window 使用，尤其是 prompt 包含长需求、文档或客户消息时。然而，token efficiency 不应被理解为对语言质量的判断。翻译选择、写作风格、标点、术语和 tokenizer 设计都会影响结果。公平的 benchmark 应使用对齐文本，说明其限制，并将测量与文化或语言主张区分开。

        长期来看，AI developer tools 可能会不像孤立的聊天窗口，而更像理解仓库、tickets、tests、logs 和部署状态的集成系统。这种集成可以让工具更有用，但也增加了对访问控制、审计记录和清晰边界的需求。工具能看到的上下文越多，团队就越需要谨慎决定允许它做什么。良好的默认设置很重要：写入权限前先只读分析，真实执行前先 dry-run，涉及花费或改变生产系统的操作前先明确确认。

        最好的团队会把 AI 辅助当作一种工程能力，而不是魔法。他们会衡量成本、验证质量、保护秘密、记录工作流，并随着模型和工具变化调整实践。谨慎使用时，AI 可以减少软件开发中的摩擦，帮助人们专注于设计、判断和沟通。粗心使用时，它可能带来隐藏复杂性、安全暴露和维护工作。差异不只取决于单个模型，更取决于围绕它的工作流纪律。
      ko: |-
        AI assistant는 소프트웨어 개발의 일반적인 일부가 되어 가고 있지만, 그 가치는 코드를 얼마나 빨리 생성하는지만으로 측정되지 않습니다. 팀들은 진짜 질문이 이러한 도구가 전체 개발 workflow를 어떻게 바꾸는가에 있다는 점을 배우고 있습니다. 낯선 시스템을 읽고, 변경을 계획하고, 테스트를 작성하고, 위험을 검토하고, 첫 버전이 배포된 뒤 소프트웨어를 유지보수하는 모든 과정입니다. 어떤 모델이 함수를 빠르게 작성하더라도 코드가 로컬 관례와 맞지 않거나, edge case를 숨기거나, 지원하기 어려운 dependency를 도입한다면 팀에 추가 작업을 만들 수 있습니다. 그래서 많은 조직은 가벼운 실험에서 더 구조화된 평가로 이동하고 있습니다.

        보통 가장 먼저 살펴보는 영역은 생산성입니다. 개발자는 긴 파일을 요약하고, 오류 메시지를 설명하고, unit test 초안을 만들고, 작은 기능의 첫 버전을 작성하는 데 AI 도구를 자주 사용합니다. 이러한 작업은 개발자가 이미 목표를 이해하고 출력물을 판단할 수 있을 때 시간을 절약합니다. 반면 legacy system, 복잡한 domain rule, security-sensitive workflow에 대한 깊은 지식이 필요한 경우 효과는 덜 예측 가능합니다. 그런 경우에도 assistant는 유용할 수 있지만, 자동 구현 엔진이라기보다는 선택지를 제안하는 협업자에 가깝습니다.

        비용도 실질적인 관심사입니다. Token usage는 언어, prompt 크기, repository context의 양, 사용 모델에 따라 크게 달라질 수 있습니다. 짧은 instruction은 비용이 거의 들지 않을 수 있지만, 여러 파일, test output, documentation, 반복 수정이 포함된 workflow는 비싸질 수 있습니다. 여러 언어를 사용하는 팀은 같은 의미의 내용도 tokenizer에 따라 token count가 달라지는 것을 볼 수 있습니다. 이것은 어떤 언어가 다른 언어보다 낫다는 뜻은 아니지만, 운영 비용을 추정할 때 token efficiency를 측정해야 한다는 뜻입니다.

        보안과 개인정보 보호에는 더 많은 주의가 필요합니다. 코드에는 내부 아키텍처 세부 사항, 고객 데이터, credentials, 리뷰 없이 외부 서비스로 보내면 안 되는 business logic이 포함되는 경우가 많습니다. 안전한 AI 개발 workflow는 어떤 정보를 공유할 수 있는지, 어떤 provider가 승인되었는지, prompt를 어떻게 기록할지, 생성된 output을 merge 전에 어떻게 review할지에 대한 명확한 규칙에서 시작합니다. Secret handling은 특히 중요합니다. API keys, access tokens, private certificates, environment files는 로그에 출력되거나 prompt에 복사되어서는 안 됩니다. 도구를 신뢰할 수 있더라도 팀은 우발적 노출을 줄이는 workflow를 설계해야 합니다.

        품질 관리는 여전히 인간의 책임입니다. AI-generated code는 다른 코드와 마찬가지로, 때로는 더 신중하게 review되어야 합니다. 겉보기에는 정돈되어 있어도 틀릴 수 있기 때문입니다. Reviewer는 변경이 실제 문제를 해결하는지, 기존 동작을 보존하는지, 오류가 명확히 처리되는지, 테스트가 현실적인 사례를 다루는지 확인해야 합니다. 문서와 요약에서는 assistant가 근거 없는 주장을 추가하지 않았는지 확인해야 합니다. Refactoring에서는 public interfaces, data migrations, compatibility requirements가 유지되는지 검증해야 합니다. 목표는 모든 제안을 불신하는 것이 아니라 검증 습관을 만드는 것입니다.

        Latency도 도입에 영향을 줍니다. 강력한 모델은 더 나은 reasoning을 제공할 수 있지만, 응답이 너무 오래 걸리면 개발자는 자주 발생하는 작은 작업에 사용하지 않을 수 있습니다. 빠른 모델은 autocomplete, quick explanation, repetitive edits에 더 유용할 수 있고, 느리지만 더 강력한 모델은 planning, architecture review, 어려운 debugging에 남겨둘 수 있습니다. 많은 팀은 결국 routine work에는 lightweight model, complex analysis에는 stronger model, search, formatting, static analysis, dependency inspection에는 specialized tool을 쓰는 tiered approach를 사용합니다.

        가장 좋은 결과는 대개 AI assistance와 기존 engineering practice를 결합할 때 나옵니다. Version control, code review, continuous integration, test coverage, issue tracking, deployment monitoring은 여전히 중요합니다. AI는 이러한 시스템을 대체하지 않고 그 위에 또 하나의 interaction layer를 더합니다. 유용한 assistant는 project constraints를 이해해야 하지만, repository가 source of truth라는 점은 변하지 않습니다. Assistant가 변경을 제안하더라도 build, tests, linters, reviewers가 그 변경을 받아들일 수 있는지 확인해야 합니다.

        팀 운영도 변하고 있습니다. 일부 팀은 bug triage, pull request review, test generation, release notes 같은 공통 작업을 위한 shared prompt templates를 작성합니다. 다른 팀은 어떤 모델을 사용할지, 얼마나 많은 context를 포함할지, 언제 AI 사용을 멈추고 teammate에게 물어볼지에 대한 내부 가이드를 유지합니다. 이러한 가이드는 혼란을 줄이고 비용 관리를 쉽게 합니다. 또한 새 팀원이 중요한 작업에 도구를 의존하기 전에 안전한 습관을 익히도록 돕습니다.

        유용한 평가 프로그램에는 technical metrics와 workflow observations가 모두 포함되어야 합니다. Technical metrics에는 token count, latency, estimated cost, error rate, test pass rate, 생성 후 필요한 review comments 수가 포함될 수 있습니다. Workflow observations에는 개발자가 output을 신뢰하는지, reviewer가 변경을 이해할 수 있는지, 도구가 숨은 위험을 늘리지 않으면서 반복 작업을 줄이는지가 포함될 수 있습니다. 하나의 benchmark가 전체 그림을 포착할 수는 없지만, 반복 가능한 작은 측정 집합은 패턴을 드러낼 수 있습니다.

        언어와 번역은 또 다른 층을 더합니다. 영어, 일본어, 중국어, 한국어, 스페인어, 프랑스어, 아랍어, 힌디어 또는 다른 언어로 일하는 팀은 비슷한 내용에서도 token count가 다르게 나올 수 있습니다. 이 차이는 특히 prompt에 긴 요구사항, documentation, customer messages가 포함될 때 비용과 context-window usage에 영향을 줄 수 있습니다. 그러나 token efficiency를 언어의 품질에 대한 판단으로 해석해서는 안 됩니다. 번역 선택, writing style, punctuation, terminology, tokenizer design이 모두 결과에 영향을 줍니다. 공정한 benchmark는 aligned texts를 사용하고, 한계를 설명하며, 측정을 문화적 또는 언어적 주장과 분리해야 합니다.

        장기적으로 AI developer tools는 고립된 chat window라기보다 repositories, tickets, tests, logs, deployment status를 이해하는 integrated systems에 가까워질 것입니다. 이러한 통합은 도구를 더 유용하게 만들 수 있지만, access control, audit trails, clear boundaries의 필요성도 높입니다. 도구가 볼 수 있는 context가 많아질수록 팀은 무엇을 허용할지 더 신중하게 결정해야 합니다. 좋은 기본값이 중요합니다. write access 전에 read-only analysis, real execution 전에 dry-run mode, 비용이 들거나 production system을 변경하는 작업 전에 explicit confirmation이 필요합니다.

        최고의 팀은 AI assistance를 마법이 아니라 engineering capability로 다룹니다. 비용을 측정하고, 품질을 검증하고, secrets를 보호하고, workflows를 문서화하며, models와 tools가 변함에 따라 practices를 조정합니다. 신중하게 사용하면 AI는 소프트웨어 개발의 마찰을 줄이고 사람들이 design, judgment, communication에 집중하도록 도울 수 있습니다. 부주의하게 사용하면 hidden complexity, security exposure, maintenance work를 만들 수 있습니다. 차이는 하나의 모델보다 그 주변 workflow의 discipline에 더 크게 달려 있습니다.
      es: |-
        Los asistentes de IA se están convirtiendo en una parte normal del desarrollo de software, pero su valor no se mide solo por la rapidez con la que generan código. Los equipos están aprendiendo que la verdadera pregunta es cómo estas herramientas cambian el flujo completo de desarrollo: leer sistemas desconocidos, planificar cambios, escribir pruebas, revisar riesgos y mantener el software después de publicar la primera versión. Un modelo que escribe una función rápidamente aún puede crear trabajo para el equipo si el código no sigue las convenciones locales, oculta un caso límite o introduce una dependencia difícil de mantener. Por eso, muchas organizaciones están pasando de la experimentación informal a una evaluación más estructurada.

        El primer aspecto que suelen examinar es la productividad. Los desarrolladores usan a menudo herramientas de IA para resumir archivos largos, explicar mensajes de error, redactar pruebas unitarias o producir una primera versión de una función pequeña. Estas tareas pueden ahorrar tiempo, sobre todo cuando el desarrollador ya entiende el objetivo y puede juzgar el resultado. El beneficio es menos predecible cuando la tarea requiere conocimiento profundo de un sistema heredado, una regla de dominio compleja o un flujo sensible para la seguridad. En esos casos, el asistente puede seguir siendo útil, pero más como colaborador que propone opciones que como motor automático de implementación.

        El costo es otra preocupación práctica. El uso de tokens puede variar mucho según el idioma, el tamaño del prompt, la cantidad de contexto del repositorio y el modelo utilizado. Una instrucción corta puede costar muy poco, mientras que un flujo de trabajo que incluye varios archivos, salida de pruebas, documentación y revisiones repetidas puede volverse costoso. Los equipos que usan varios idiomas también pueden notar que contenidos equivalentes producen diferentes cantidades de tokens según el tokenizer. Esto no significa que un idioma sea mejor que otro, pero sí significa que la eficiencia de tokens debe medirse al estimar costos operativos.

        La seguridad y la privacidad requieren aún más cuidado. El código a menudo contiene detalles de arquitectura interna, datos de clientes, credenciales o lógica de negocio que no debería enviarse a servicios externos sin revisión. Un flujo seguro de desarrollo con IA comienza con reglas claras sobre qué información puede compartirse, qué proveedores están aprobados, cómo se registran los prompts y cómo se revisa la salida generada antes de integrarla. El manejo de secretos es especialmente importante. API keys, access tokens, certificados privados y archivos de entorno nunca deberían imprimirse en logs ni copiarse en prompts. Incluso cuando una herramienta es confiable, los equipos deben diseñar flujos que reduzcan la exposición accidental.

        El control de calidad sigue siendo responsabilidad humana. El código generado por IA debe revisarse como cualquier otro código, y a veces con más cuidado, porque puede parecer pulido y aun así estar equivocado. Los revisores deben comprobar si el cambio resuelve el problema real, si conserva el comportamiento existente, si los errores se manejan claramente y si las pruebas cubren casos realistas. En documentación y resúmenes, deben verificar que el asistente no haya añadido afirmaciones sin respaldo. En refactorizaciones, deben confirmar que se preservan interfaces públicas, migraciones de datos y requisitos de compatibilidad. El objetivo no es desconfiar de cada sugerencia, sino crear un hábito de verificación.

        La latencia también afecta la adopción. Un modelo potente puede razonar mejor, pero si tarda demasiado en responder, los desarrolladores pueden evitar usarlo para tareas pequeñas y frecuentes. Un modelo más rápido puede ser más útil para autocompletado, explicaciones rápidas o ediciones repetitivas, mientras que uno más lento y capaz puede reservarse para planificación, revisión de arquitectura o depuración difícil. Muchos equipos terminan usando un enfoque por niveles: modelos ligeros para trabajo rutinario, modelos más fuertes para análisis complejo y herramientas especializadas para búsqueda, formato, análisis estático o inspección de dependencias.

        Los mejores resultados suelen venir de combinar la asistencia de IA con prácticas de ingeniería existentes. El control de versiones, la revisión de código, la integración continua, la cobertura de pruebas, el seguimiento de incidencias y el monitoreo de despliegues siguen importando. La IA no reemplaza estos sistemas; añade otra capa de interacción sobre ellos. Un asistente útil debe entender las restricciones del proyecto, pero el repositorio sigue siendo la fuente de verdad. Si el asistente propone un cambio, la compilación, las pruebas, los linters y los revisores deben confirmar que el cambio es aceptable.

        La operación de los equipos también está cambiando. Algunos equipos escriben plantillas de prompts compartidas para tareas comunes como clasificación de bugs, revisión de pull requests, generación de pruebas y notas de versión. Otros mantienen guías internas sobre qué modelos usar, cuánto contexto incluir y cuándo dejar de usar IA y preguntar a un compañero. Estas guías reducen la confusión y hacen que los costos sean más fáciles de gestionar. También ayudan a los nuevos integrantes a aprender hábitos seguros antes de depender de las herramientas para trabajo importante.

        Un programa de evaluación útil debe incluir métricas técnicas y observaciones del flujo de trabajo. Las métricas técnicas pueden incluir token count, latencia, costo estimado, tasa de errores, tasa de pruebas aprobadas y número de comentarios de revisión necesarios después de la generación. Las observaciones pueden incluir si los desarrolladores confían en la salida, si los revisores entienden los cambios y si la herramienta reduce trabajo repetitivo sin aumentar riesgos ocultos. Ningún benchmark único puede capturar todo el panorama, pero un pequeño conjunto de mediciones repetibles puede revelar patrones.

        El idioma y la traducción añaden otra capa. Un equipo que trabaja en inglés, japonés, chino, coreano, español, francés, árabe, hindi u otros idiomas puede ver diferentes recuentos de tokens para contenido similar. La diferencia puede afectar el costo y el uso de la ventana de contexto, especialmente cuando los prompts incluyen requisitos largos, documentación o mensajes de clientes. Sin embargo, la eficiencia de tokens no debe interpretarse como un juicio sobre la calidad de un idioma. Las decisiones de traducción, el estilo de escritura, la puntuación, la terminología y el diseño del tokenizer influyen en el resultado. Un benchmark justo debe usar textos alineados, explicar sus limitaciones y separar la medición de afirmaciones culturales o lingüísticas.

        A largo plazo, las herramientas de IA para desarrolladores probablemente se parecerán menos a ventanas de chat aisladas y más a sistemas integrados que entienden repositorios, tickets, pruebas, logs y estado de despliegue. Esa integración puede hacerlas más útiles, pero también aumenta la necesidad de control de acceso, registros de auditoría y límites claros. Cuanto más contexto pueda ver una herramienta, con más cuidado deben decidir los equipos qué se le permite hacer. Los buenos valores predeterminados importan: análisis de solo lectura antes de acceso de escritura, modos dry-run antes de ejecución real y confirmación explícita antes de acciones que cuestan dinero o cambian sistemas de producción.

        Los mejores equipos tratarán la asistencia de IA como una capacidad de ingeniería, no como magia. Medirán el costo, verificarán la calidad, protegerán secretos, documentarán flujos de trabajo y ajustarán sus prácticas a medida que cambien los modelos y las herramientas. Usada con cuidado, la IA puede reducir fricción en el desarrollo de software y ayudar a las personas a enfocarse en diseño, juicio y comunicación. Usada sin cuidado, puede crear complejidad oculta, exposición de seguridad y trabajo de mantenimiento. La diferencia depende menos de un solo modelo y más de la disciplina del flujo de trabajo que lo rodea.
      fr: |-
        Les assistants IA deviennent une partie normale du développement logiciel, mais leur valeur ne se mesure pas seulement à la vitesse à laquelle ils peuvent générer du code. Les équipes apprennent que la vraie question est de savoir comment ces outils changent l'ensemble du flux de développement : lire des systèmes inconnus, planifier des changements, écrire des tests, examiner les risques et maintenir le logiciel après la livraison de la première version. Un modèle qui écrit rapidement une fonction peut tout de même créer du travail pour l'équipe si le code ne respecte pas les conventions locales, cache un cas limite ou introduit une dépendance difficile à prendre en charge. Pour cette raison, de nombreuses organisations passent de l'expérimentation occasionnelle à une évaluation plus structurée.

        Le premier domaine qu'elles examinent généralement est la productivité. Les développeurs utilisent souvent des outils d'IA pour résumer de longs fichiers, expliquer des messages d'erreur, rédiger des tests unitaires ou produire une première version d'une petite fonctionnalité. Ces tâches peuvent faire gagner du temps, surtout lorsque le développeur comprend déjà l'objectif et peut juger la sortie. Le bénéfice est moins prévisible lorsque la tâche exige une connaissance approfondie d'un système ancien, d'une règle métier complexe ou d'un flux sensible sur le plan de la sécurité. Dans ces cas, l'assistant peut rester utile, mais surtout comme collaborateur qui propose des options plutôt que comme moteur d'implémentation automatique.

        Le coût est une autre préoccupation pratique. L'utilisation de tokens peut varier fortement selon la langue, la taille du prompt, la quantité de contexte du dépôt et le modèle utilisé. Une instruction courte peut coûter très peu, tandis qu'un flux incluant plusieurs fichiers, des sorties de tests, de la documentation et des révisions répétées peut devenir coûteux. Les équipes qui utilisent plusieurs langues peuvent aussi constater qu'un contenu équivalent produit des nombres de tokens différents selon le tokenizer. Cela ne signifie pas qu'une langue est meilleure qu'une autre, mais que l'efficacité en tokens doit être mesurée lors de l'estimation des coûts d'exploitation.

        La sécurité et la confidentialité exigent encore plus de prudence. Le code contient souvent des détails d'architecture interne, des données clients, des identifiants ou une logique métier qui ne devraient pas être envoyés à des services externes sans revue. Un flux de développement IA sûr commence par des règles claires sur les informations pouvant être partagées, les fournisseurs approuvés, la journalisation des prompts et la revue de la sortie générée avant fusion. La gestion des secrets est particulièrement importante. Les clés API, tokens d'accès, certificats privés et fichiers d'environnement ne doivent jamais être imprimés dans les logs ni copiés dans les prompts. Même lorsqu'un outil est fiable, les équipes doivent concevoir des flux qui réduisent l'exposition accidentelle.

        Le contrôle qualité reste une responsabilité humaine. Le code généré par IA doit être relu comme tout autre code, et parfois plus attentivement, car il peut paraître soigné tout en étant faux. Les relecteurs doivent vérifier si le changement résout le vrai problème, préserve le comportement existant, gère les erreurs clairement et couvre des cas réalistes par des tests. Pour la documentation et les résumés, ils doivent vérifier que l'assistant n'a pas ajouté d'affirmations non étayées. Pour le refactoring, ils doivent confirmer que les interfaces publiques, les migrations de données et les exigences de compatibilité sont préservées. Le but n'est pas de se méfier de chaque suggestion, mais de créer une habitude de vérification.

        La latence influence aussi l'adoption. Un modèle puissant peut produire un meilleur raisonnement, mais s'il répond trop lentement, les développeurs peuvent éviter de l'utiliser pour de petites tâches fréquentes. Un modèle plus rapide peut être plus utile pour l'autocomplétion, les explications rapides ou les modifications répétitives, tandis qu'un modèle plus lent et plus capable peut être réservé à la planification, à la revue d'architecture ou au débogage difficile. Beaucoup d'équipes finissent par adopter une approche par niveaux : modèles légers pour le travail courant, modèles plus forts pour l'analyse complexe et outils spécialisés pour la recherche, le formatage, l'analyse statique ou l'inspection des dépendances.

        Les meilleurs résultats viennent souvent de la combinaison entre assistance IA et pratiques d'ingénierie existantes. Le contrôle de version, la revue de code, l'intégration continue, la couverture de tests, le suivi des tickets et la surveillance des déploiements restent importants. L'IA ne remplace pas ces systèmes ; elle ajoute une couche d'interaction au-dessus d'eux. Un assistant utile doit comprendre les contraintes du projet, mais le dépôt reste la source de vérité. Si l'assistant propose un changement, le build, les tests, les linters et les relecteurs doivent encore confirmer que ce changement est acceptable.

        Le fonctionnement des équipes change également. Certaines équipes écrivent des modèles de prompts partagés pour des tâches courantes comme le tri de bugs, la revue de pull requests, la génération de tests et les notes de version. D'autres maintiennent des consignes internes sur les modèles à utiliser, la quantité de contexte à inclure et le moment où il faut arrêter d'utiliser l'IA pour demander à un coéquipier. Ces consignes réduisent la confusion et facilitent la gestion des coûts. Elles aident aussi les nouveaux membres à acquérir des habitudes sûres avant de dépendre des outils pour un travail important.

        Un programme d'évaluation utile doit inclure à la fois des métriques techniques et des observations de flux de travail. Les métriques techniques peuvent inclure le nombre de tokens, la latence, le coût estimé, le taux d'erreur, le taux de réussite des tests et le nombre de commentaires de revue nécessaires après génération. Les observations peuvent inclure la confiance des développeurs dans la sortie, la capacité des relecteurs à comprendre les changements et la réduction du travail répétitif sans augmentation du risque caché. Aucun benchmark unique ne peut capturer l'ensemble du tableau, mais un petit ensemble de mesures répétables peut révéler des tendances.

        La langue et la traduction ajoutent une autre couche. Une équipe qui travaille en anglais, japonais, chinois, coréen, espagnol, français, arabe, hindi ou dans d'autres langues peut observer des nombres de tokens différents pour un contenu similaire. Cette différence peut affecter le coût et l'utilisation de la fenêtre de contexte, surtout lorsque les prompts incluent de longues exigences, de la documentation ou des messages clients. Cependant, l'efficacité en tokens ne doit pas être interprétée comme un jugement sur la qualité d'une langue. Les choix de traduction, le style d'écriture, la ponctuation, la terminologie et la conception du tokenizer influencent tous le résultat. Un benchmark équitable doit utiliser des textes alignés, expliquer ses limites et séparer la mesure des affirmations culturelles ou linguistiques.

        À long terme, les outils IA pour développeurs ressembleront probablement moins à des fenêtres de chat isolées et davantage à des systèmes intégrés qui comprennent les dépôts, les tickets, les tests, les logs et l'état des déploiements. Cette intégration peut les rendre plus utiles, mais elle augmente aussi le besoin de contrôle d'accès, de traces d'audit et de limites claires. Plus un outil peut voir de contexte, plus les équipes doivent décider avec soin ce qu'il est autorisé à faire. De bons paramètres par défaut comptent : analyse en lecture seule avant l'accès en écriture, modes dry-run avant l'exécution réelle et confirmation explicite avant les actions qui coûtent de l'argent ou modifient les systèmes de production.

        Les meilleures équipes traiteront l'assistance IA comme une capacité d'ingénierie, pas comme de la magie. Elles mesureront le coût, vérifieront la qualité, protégeront les secrets, documenteront les flux et ajusteront leurs pratiques à mesure que les modèles et les outils changent. Utilisée avec soin, l'IA peut réduire les frictions dans le développement logiciel et aider les personnes à se concentrer sur la conception, le jugement et la communication. Utilisée sans précaution, elle peut créer une complexité cachée, une exposition de sécurité et du travail de maintenance. La différence dépend moins d'un modèle unique que de la discipline du flux de travail qui l'entoure.
      ar: |-
        أصبحت مساعدات الذكاء الاصطناعي جزءا طبيعيا من تطوير البرمجيات، لكن قيمتها لا تقاس فقط بسرعة توليد الكود. تتعلم الفرق أن السؤال الحقيقي هو كيف تغير هذه الأدوات سير العمل الكامل للتطوير: قراءة الأنظمة غير المألوفة، وتخطيط التغييرات، وكتابة الاختبارات، ومراجعة المخاطر، وصيانة البرمجيات بعد شحن النسخة الأولى. قد يكتب نموذج ما دالة بسرعة، لكنه قد يخلق عملا إضافيا للفريق إذا لم يطابق الكود الأعراف المحلية، أو أخفى حالة طرفية، أو أضاف اعتمادا يصعب دعمه. لهذا السبب تنتقل منظمات كثيرة من التجربة العفوية إلى تقييم أكثر تنظيما.

        المجال الأول الذي تفحصه الفرق عادة هو الإنتاجية. يستخدم المطورون أدوات الذكاء الاصطناعي غالبا لتلخيص الملفات الطويلة، وشرح رسائل الخطأ، وصياغة اختبارات الوحدة، أو إنتاج نسخة أولى من ميزة صغيرة. يمكن لهذه المهام أن توفر الوقت، خاصة عندما يكون المطور قد فهم الهدف مسبقا وقادرا على الحكم على المخرجات. تصبح الفائدة أقل قابلية للتنبؤ عندما تتطلب المهمة معرفة عميقة بنظام قديم، أو قاعدة مجال معقدة، أو سير عمل حساس للأمن. في تلك الحالات، قد يظل المساعد مفيدا، لكن غالبا بصفته متعاونا يقترح خيارات لا محرك تنفيذ تلقائيا.

        التكلفة مصدر قلق عملي آخر. يمكن أن يختلف استخدام tokens اختلافا كبيرا بحسب اللغة، وحجم prompt، وكمية سياق المستودع، والنموذج المستخدم. قد تكون instruction قصيرة قليلة التكلفة، بينما قد يصبح workflow يتضمن عدة ملفات ومخرجات اختبارات ووثائق ومراجعات متكررة مكلفا. قد تلاحظ الفرق التي تستخدم لغات متعددة أيضا أن المحتوى المتكافئ ينتج أعداد tokens مختلفة بحسب tokenizer. هذا لا يعني أن لغة أفضل من أخرى، لكنه يعني أن token efficiency ينبغي قياسها عند تقدير تكاليف التشغيل.

        يتطلب الأمن والخصوصية عناية أكبر. غالبا ما يحتوي الكود على تفاصيل معمارية داخلية، وبيانات عملاء، وcredentials، أو منطق أعمال لا ينبغي إرساله إلى خدمات خارجية من دون مراجعة. يبدأ سير تطوير آمن بالذكاء الاصطناعي بقواعد واضحة حول المعلومات التي يجوز مشاركتها، والجهات المزودة المعتمدة، وكيفية تسجيل prompts، وكيفية مراجعة المخرجات المولدة قبل دمجها. التعامل مع الأسرار مهم بشكل خاص. يجب ألا تطبع API keys وaccess tokens والشهادات الخاصة وملفات البيئة في logs أو تنسخ إلى prompts. حتى عندما تكون الأداة موثوقة، ينبغي للفرق تصميم workflows تقلل التعرض العرضي.

        تظل مراقبة الجودة مسؤولية بشرية. يجب مراجعة الكود المولد بالذكاء الاصطناعي مثل أي كود آخر، وأحيانا بعناية أكبر، لأنه قد يبدو مصقولا لكنه خاطئ. يجب على المراجعين التحقق مما إذا كان التغيير يحل المشكلة الحقيقية، ويحافظ على السلوك الحالي، ويتعامل مع الأخطاء بوضوح، وتغطي الاختبارات حالات واقعية. بالنسبة للوثائق والملخصات، يجب التأكد من أن المساعد لم يضف ادعاءات غير مدعومة. وفي refactoring يجب التحقق من الحفاظ على الواجهات العامة، وعمليات ترحيل البيانات، ومتطلبات التوافق. الهدف ليس عدم الثقة بكل اقتراح، بل بناء عادة التحقق.

        تؤثر latency أيضا في التبني. قد ينتج نموذج قوي reasoning أفضل، لكن إذا استغرق وقتا طويلا في الرد فقد يتجنب المطورون استخدامه للمهام الصغيرة المتكررة. قد يكون النموذج الأسرع أكثر فائدة للإكمال التلقائي والشرح السريع والتعديلات المتكررة، بينما يحتفظ بالنموذج الأبطأ والأقدر للتخطيط ومراجعة المعمارية وتصحيح الأخطاء الصعب. تنتهي فرق كثيرة إلى نهج متعدد المستويات: نماذج خفيفة للعمل الروتيني، ونماذج أقوى للتحليل المعقد، وأدوات متخصصة للبحث والتنسيق والتحليل الساكن وفحص الاعتمادات.

        تأتي أقوى النتائج عادة من الجمع بين مساعدة الذكاء الاصطناعي وممارسات الهندسة القائمة. ما زالت إدارة الإصدارات، ومراجعة الكود، والتكامل المستمر، وتغطية الاختبارات، وتتبع القضايا، ومراقبة النشر مهمة. لا يستبدل الذكاء الاصطناعي هذه الأنظمة، بل يضيف طبقة تفاعل فوقها. ينبغي للمساعد المفيد أن يفهم قيود المشروع، لكن المستودع يبقى source of truth. إذا اقترح المساعد تغييرا، فما زال على البناء والاختبارات وlinters والمراجعين تأكيد أن التغيير مقبول.

        يتغير تشغيل الفرق أيضا. تكتب بعض الفرق prompt templates مشتركة لمهام شائعة مثل bug triage وpull request review وtest generation وrelease notes. وتحافظ فرق أخرى على إرشادات داخلية حول النماذج التي تستخدم، ومقدار السياق الذي يدرج، ومتى يجب التوقف عن استخدام الذكاء الاصطناعي وسؤال زميل. تقلل هذه الإرشادات الارتباك وتجعل إدارة التكاليف أسهل. كما تساعد الأعضاء الجدد على تعلم عادات آمنة قبل الاعتماد على الأدوات في العمل المهم.

        ينبغي أن يتضمن برنامج التقييم المفيد مقاييس تقنية وملاحظات حول سير العمل. قد تشمل المقاييس التقنية عدد tokens وlatency والتكلفة المقدرة ومعدل الخطأ ومعدل اجتياز الاختبارات وعدد تعليقات المراجعة المطلوبة بعد التوليد. وقد تشمل ملاحظات سير العمل ما إذا كان المطورون يثقون بالمخرجات، وما إذا كان المراجعون يفهمون التغييرات، وما إذا كانت الأداة تقلل العمل المتكرر من دون زيادة خطر خفي. لا يستطيع benchmark واحد التقاط الصورة كاملة، لكن مجموعة صغيرة من القياسات القابلة للتكرار يمكن أن تكشف الأنماط.

        تضيف اللغة والترجمة طبقة أخرى. قد ترى الفرق التي تعمل بالإنجليزية أو اليابانية أو الصينية أو الكورية أو الإسبانية أو الفرنسية أو العربية أو الهندية أو غيرها أعداد tokens مختلفة لمحتوى مشابه. يمكن لهذا الفرق أن يؤثر في التكلفة واستخدام context window، خصوصا عندما تتضمن prompts متطلبات طويلة أو وثائق أو رسائل عملاء. ومع ذلك لا ينبغي تفسير token efficiency كحكم على جودة اللغة. تؤثر اختيارات الترجمة وأسلوب الكتابة وعلامات الترقيم والمصطلحات وتصميم tokenizer كلها في النتيجة. يجب أن يستخدم benchmark عادل نصوصا متوازية، وأن يشرح حدوده، وأن يفصل القياس عن الادعاءات الثقافية أو اللغوية.

        على المدى الطويل، من المرجح أن تصبح أدوات الذكاء الاصطناعي للمطورين أقل شبها بنوافذ دردشة معزولة وأكثر شبها بأنظمة مدمجة تفهم المستودعات وtickets والاختبارات وlogs وحالة النشر. يمكن لهذا التكامل أن يجعل الأدوات أكثر فائدة، لكنه يزيد أيضا الحاجة إلى access control وaudit trails وحدود واضحة. كلما زاد السياق الذي تستطيع الأداة رؤيته، زادت ضرورة أن تقرر الفرق بعناية ما يسمح لها بفعله. الإعدادات الافتراضية الجيدة مهمة: تحليل read-only قبل صلاحية الكتابة، وأنماط dry-run قبل التنفيذ الحقيقي، وتأكيد صريح قبل الإجراءات التي تكلف مالا أو تغير أنظمة الإنتاج.

        ستتعامل أفضل الفرق مع مساعدة الذكاء الاصطناعي كقدرة هندسية لا كسحر. ستقيس التكلفة، وتتحقق من الجودة، وتحمي الأسرار، وتوثق workflows، وتعدل ممارساتها مع تغير النماذج والأدوات. إذا استخدم الذكاء الاصطناعي بعناية، فيمكنه تقليل الاحتكاك في تطوير البرمجيات ومساعدة الناس على التركيز على التصميم والحكم والتواصل. وإذا استخدم بإهمال، فقد يخلق تعقيدا خفيا وتعرضا أمنيا وعملا إضافيا للصيانة. يعتمد الفرق بدرجة أقل على نموذج واحد وبدرجة أكبر على انضباط workflow المحيط به.
      hi: |-
        AI assistants software development का सामान्य हिस्सा बनते जा रहे हैं, लेकिन उनका मूल्य केवल इस बात से नहीं मापा जाता कि वे कितनी जल्दी code generate कर सकते हैं। Teams सीख रही हैं कि असली सवाल यह है कि ये tools पूरे development workflow को कैसे बदलते हैं: अनजान systems पढ़ना, changes plan करना, tests लिखना, risks review करना, और पहली version ship होने के बाद software maintain करना। कोई model जल्दी function लिख सकता है, फिर भी यदि code local conventions से मेल नहीं खाता, edge case छिपाता है, या ऐसी dependency लाता है जिसे support करना कठिन है, तो वह team के लिए काम बढ़ा सकता है। इसी कारण कई organizations casual experimentation से अधिक structured evaluation की ओर बढ़ रही हैं।

        वे आम तौर पर सबसे पहले productivity देखते हैं। Developers अक्सर AI tools का उपयोग लंबे files summarize करने, error messages समझाने, unit tests draft करने, या किसी छोटी feature का पहला version बनाने के लिए करते हैं। ये tasks समय बचा सकते हैं, खासकर जब developer पहले से goal समझता हो और output को judge कर सके। जब task legacy system, complex domain rule, या security-sensitive workflow की गहरी जानकारी मांगता है, तो benefit कम predictable होता है। ऐसे मामलों में assistant अब भी useful हो सकता है, लेकिन अधिकतर automatic implementation engine की बजाय options propose करने वाले collaborator के रूप में।

        Cost भी एक व्यावहारिक चिंता है। Token usage भाषा, prompt के आकार, repository context की मात्रा और इस्तेमाल किए जा रहे model के आधार पर बहुत बदल सकता है। एक छोटी instruction की cost बहुत कम हो सकती है, जबकि कई files, test output, documentation और repeated revisions वाला workflow expensive हो सकता है। Multiple languages का उपयोग करने वाली teams यह भी देख सकती हैं कि equivalent content tokenizer के आधार पर अलग token counts देता है। इसका अर्थ यह नहीं कि एक भाषा दूसरी से बेहतर है, लेकिन operating costs का अनुमान लगाते समय token efficiency मापी जानी चाहिए।

        Security और privacy को और अधिक सावधानी चाहिए। Code में अक्सर internal architecture details, customer data, credentials, या business logic होते हैं जिन्हें review के बिना external services को नहीं भेजना चाहिए। Safe AI development workflow स्पष्ट rules से शुरू होता है: कौन सी information share की जा सकती है, कौन से providers approved हैं, prompts कैसे log किए जाते हैं, और generated output merge से पहले कैसे review होता है। Secret handling विशेष रूप से महत्वपूर्ण है। API keys, access tokens, private certificates और environment files को logs में print या prompts में copy कभी नहीं करना चाहिए। Tool trusted हो तब भी teams को accidental exposure कम करने वाले workflows design करने चाहिए।

        Quality control मानव जिम्मेदारी बनी रहती है। AI-generated code को किसी भी code की तरह review किया जाना चाहिए, और कभी-कभी अधिक सावधानी से, क्योंकि वह polished दिखते हुए भी गलत हो सकता है। Reviewers को जांचना चाहिए कि change वास्तविक समस्या हल करता है या नहीं, existing behavior preserve करता है या नहीं, errors clearly handle होते हैं या नहीं, और tests realistic cases cover करते हैं या नहीं। Documentation और summaries के लिए reviewers को जांचना चाहिए कि assistant ने unsupported claims नहीं जोड़े। Refactoring के लिए उन्हें verify करना चाहिए कि public interfaces, data migrations और compatibility requirements preserve हैं। लक्ष्य हर suggestion पर अविश्वास करना नहीं, बल्कि verification की habit बनाना है।

        Latency भी adoption को प्रभावित करती है। Powerful model बेहतर reasoning दे सकता है, लेकिन यदि response बहुत देर से आता है, तो developers उसे frequent small tasks के लिए इस्तेमाल करने से बच सकते हैं। Faster model autocomplete, quick explanations या repetitive edits के लिए अधिक useful हो सकता है, जबकि slower और अधिक capable model planning, architecture review या difficult debugging के लिए रखा जा सकता है। कई teams अंततः tiered approach अपनाती हैं: routine work के लिए lightweight models, complex analysis के लिए stronger models, और search, formatting, static analysis या dependency inspection जैसे tasks के लिए specialized tools।

        सबसे मजबूत परिणाम आमतौर पर AI assistance को existing engineering practices के साथ मिलाने से आते हैं। Version control, code review, continuous integration, test coverage, issue tracking और deployment monitoring अब भी महत्वपूर्ण हैं। AI इन systems को replace नहीं करता; वह इनके ऊपर interaction की एक और layer जोड़ता है। Useful assistant को project constraints समझने चाहिए, लेकिन repository source of truth बना रहता है। यदि assistant change propose करता है, तब भी build, tests, linters और reviewers को confirm करना होगा कि change acceptable है।

        Team operation भी बदल रहा है। कुछ teams bug triage, pull request review, test generation और release notes जैसे common tasks के लिए shared prompt templates लिखती हैं। अन्य teams internal guidance रखती हैं कि कौन से models use करने हैं, कितना context include करना है, और कब AI use करना बंद करके teammate से पूछना है। ये guidelines confusion कम करती हैं और costs manage करना आसान बनाती हैं। वे नए team members को important work में tools पर निर्भर होने से पहले safe habits सीखने में भी मदद करती हैं।

        Useful evaluation program में technical metrics और workflow observations दोनों शामिल होने चाहिए। Technical metrics में token count, latency, estimated cost, error rate, test pass rate और generation के बाद required review comments की संख्या शामिल हो सकती है। Workflow observations में यह शामिल हो सकता है कि developers output पर trust करते हैं या नहीं, reviewers changes समझ पाते हैं या नहीं, और tool hidden risk बढ़ाए बिना repetitive work कम करता है या नहीं। कोई single benchmark पूरी तस्वीर capture नहीं कर सकता, लेकिन repeatable measurements का छोटा set patterns दिखा सकता है।

        Language और translation एक और layer जोड़ते हैं। English, Japanese, Chinese, Korean, Spanish, French, Arabic, Hindi या अन्य भाषाओं में काम करने वाली team similar content के लिए अलग token counts देख सकती है। Difference cost और context-window usage को प्रभावित कर सकता है, खासकर जब prompts में long requirements, documentation या customer messages शामिल हों। फिर भी token efficiency को भाषा की quality पर judgement नहीं मानना चाहिए। Translation choices, writing style, punctuation, terminology और tokenizer design सभी result को प्रभावित करते हैं। Fair benchmark को aligned texts उपयोग करने चाहिए, अपनी limitations explain करनी चाहिए, और measurement को cultural या linguistic claims से अलग रखना चाहिए।

        Long term में AI developer tools शायद isolated chat windows जैसे कम और repositories, tickets, tests, logs और deployment status समझने वाले integrated systems जैसे अधिक होंगे। वह integration tools को अधिक useful बना सकता है, लेकिन access control, audit trails और clear boundaries की जरूरत भी बढ़ाता है। Tool जितना अधिक context देख सकता है, teams को उतनी सावधानी से तय करना होगा कि उसे क्या करने की अनुमति है। Good defaults महत्वपूर्ण हैं: write access से पहले read-only analysis, real execution से पहले dry-run modes, और money cost करने या production systems बदलने वाली actions से पहले explicit confirmation।

        Best teams AI assistance को magic नहीं, engineering capability मानेंगी। वे cost measure करेंगी, quality verify करेंगी, secrets protect करेंगी, workflows document करेंगी, और models तथा tools बदलने पर practices adjust करेंगी। सावधानी से उपयोग करने पर AI software development में friction घटा सकता है और लोगों को design, judgment और communication पर focus करने में मदद कर सकता है। लापरवाही से उपयोग करने पर यह hidden complexity, security exposure और maintenance work बना सकता है। फर्क किसी single model पर कम और उसके आसपास के workflow discipline पर अधिक निर्भर करता है।
